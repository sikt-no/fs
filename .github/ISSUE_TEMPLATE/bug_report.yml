name: 🐛 Feil
description: Rapporter en feil i FS
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Beskrivelse av feil
      description: En tydelig og kortfattet beskrivelse av feilen, gjerne med referanse til RT-sak
      placeholder: |
        Beskriv feilen som oppstår:
        - Hva skjer som ikke skal skje?
        - Når oppstår feilen?
        - Hvilke deler av systemet er påvirket?
    validations:
      required: true

  - type: dropdown
    id: reprodusable
    attributes:
      label: Reprodusert
      description: Lar feilen seg reprodusere
      options:
        - Ja - Ja, vi reproduserer feilen
        - Nei - Sak avsluttes
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Alvorlighetsgrad
      description: Hvor mange brukere/prosesser påvirkes?
      options:
        - Lav - Påvirker enkeltbrukere sporadisk
        - Middels - Påvirker noen brukere regelmessig
        - Høy - Påvirker mange brukere eller kritiske prosesser
        - Kritisk - Påvirker alle brukere eller systemstabilitet
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Miljø
      description: Hvor oppdages feilen?
      placeholder: |
        - Miljø: (test/staging/produksjon)
        - Nettleser: (hvis relevant)
        - Operativsystem: (hvis relevant)
        - Versjon/branch: (hvis kjent)
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Tilleggsinformasjon
      description: Legg til eventuelle skjermbilder eller annen kontekst
      placeholder: |
        - Skjermbilder av feilen
        - Relaterte issues
        - Når feilen først ble oppdaget
        - Frekvens av feilen
    validations:
      required: false
