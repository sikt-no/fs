name: 🔧 Vedlikehold og drift
description: Teknisk gjeld, vedlikehold og oppgraderinger (BAU/HART-aktiviteter)
title: "[MAINTENANCE] "
labels: ["type:maintenance"]
body:
  - type: dropdown
    id: maintenance_type
    attributes:
      label: Type vedlikehold
      description: Hvilken type vedlikehold gjelder dette?
      options:
        - Teknisk gjeld
        - Oppgradering av avhengigheter
        - Refaktorering
        - Sikkerhetspatch
        - Ytelsesoptimalisering  
        - Dokumentasjon
        - Testing/testdekning
        - CI/CD forbedringer
        - drift
        - Databaseoppgradering
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Nåværende tilstand
      description: Beskrivelse av det som trenger vedlikehold
      placeholder: |
        Beskriv nåværende situasjon:
        - Hva er problemet med dagens løsning?
        - Hvorfor trenger det vedlikehold?
        - Hvilke risikoer finnes hvis dette ikke gjøres?
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Fordeler ved vedlikeholdet
      description: Hvilken verdi gir dette arbeidet?
      placeholder: |
        Fordeler ved å gjøre dette arbeidet:
        - [ ] Redusert teknisk gjeld
        - [ ] Forbedret sikkerhet  
        - [ ] Bedre ytelse
        - [ ] Enklere vedlikehold fremover
        - [ ] Forbedret utvikleropplevelse
        - [ ] Økt systemstabilitet
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Tilleggsnotater
      description: Annen relevant informasjon
      placeholder: |
        - Lenker til relevant dokumentasjon
        - Avhengigheter til andre saker
        - Tidspunkt når arbeidet bør gjøres
        - Koordinering som trengs
    validations:
      required: false
